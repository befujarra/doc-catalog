<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Catalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <nav class="navbar sticky-top border-bottom px-4 py-3">
    <div class="d-flex align-items-center gap-3 w-100 flex-wrap">

      <div class="d-flex align-items-center gap-2 flex-shrink-0">
        <span style="font-size:2rem">📚</span>
        <div>
          <h1 class="h5 mb-0 fw-bold">Docs Catalog</h1>
          <p class="text-secondary mb-0 small">Seu catálogo pessoal de anotações</p>
        </div>
      </div>

      <div class="position-relative flex-grow-1" style="min-width:260px">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" class="form-control search-input"
          placeholder="Buscar por tema, tag ou conteúdo..." autocomplete="off" />
        <button class="clear-btn d-none" id="clear-btn" aria-label="Limpar busca">×</button>
      </div>

    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="container-fluid p-4">
    <div class="row g-4 align-items-start">

      <!-- SIDEBAR -->
      <aside class="col-md-3">
        <div class="card p-3 sidebar-sticky">

          <p class="filter-label">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Categorias
          </p>
          <ul id="categories-list" class="list-unstyled mb-4"></ul>

          <p class="filter-label">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
              <line x1="7" y1="7" x2="7.01" y2="7"></line>
            </svg>
            Tags
          </p>
          <div id="tags-cloud" class="d-flex flex-wrap gap-1 mb-3"></div>

          <button class="btn btn-outline-secondary btn-sm d-none" id="reset-filters">Limpar filtros</button>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="col-md-9">
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <span id="results-info" class="text-secondary small"></span>
          <select id="sort-select" class="form-select form-select-sm w-auto">
            <option value="default">Ordenar: padrão</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
          </select>
        </div>

        <div id="cards-grid" class="row g-3 row-cols-1 row-cols-md-2 row-cols-xl-3"></div>

        <div id="no-results" class="text-center py-5 d-none">
          <div style="font-size:3rem" class="mb-3">🔍</div>
          <p class="text-secondary">Nenhum resultado encontrado para <strong id="search-term-display"></strong></p>
          <button class="btn btn-outline-secondary btn-sm" id="no-results-reset">Limpar filtros</button>
        </div>
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
